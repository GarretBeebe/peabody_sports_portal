{% extends 'base.html' %}
{% block title %}Upload Sports CSV — Peabody Sports{% endblock %}

{% block content %}
<h2 class="mb-2">Upload Sports CSV</h2>
<p class="text-muted mb-4">Existing sports are updated by name (upsert). New sports are added.</p>

<div class="col-md-5">
  <div class="alert alert-info small mb-4">
    <strong>Required columns:</strong> <code>name</code>, <code>league</code><br>
    <strong>Optional:</strong> <code>league_website</code>
  </div>

  <form method="post" enctype="multipart/form-data">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
      <label class="form-label">CSV File</label>
      <input type="file" name="file" accept=".csv" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary">Import</button>
    <a href="{{ url_for('admin.sports_list') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
  </form>
</div>
{% endblock %}
