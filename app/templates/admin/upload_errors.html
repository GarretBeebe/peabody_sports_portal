{% extends 'base.html' %}
{% block title %}Import Errors — Peabody Sports{% endblock %}

{% block content %}
<h2 class="mb-1">Import Failed — {{ entity }}</h2>
<p class="text-muted mb-4">Fix the errors below and re-upload the file. No records were saved.</p>

<div class="alert alert-danger">
  <ul class="mb-0">
    {% for error in errors %}
      <li>{{ error }}</li>
    {% endfor %}
  </ul>
</div>

<a href="{{ request.referrer or url_for('admin.dashboard') }}" class="btn btn-secondary">Back</a>
{% endblock %}
